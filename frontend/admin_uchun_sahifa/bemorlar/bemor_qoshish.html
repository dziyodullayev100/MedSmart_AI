<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Med Smart - Yangi bemor qo'shish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --secondary: #334155;
            --bg-color: #f8fafc;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-color); margin: 0; display: flex; min-height: 100vh; }

        /* STANDARD SIDEBAR */
        .sidebar {
            width: 280px; background: var(--secondary); color: white;
            display: flex; flex-direction: column; position: fixed;
            height: 100vh; padding: 30px 20px; z-index: 1000;
        }
        .sidebar-brand { display: flex; align-items: center; gap: 15px; margin-bottom: 50px; padding: 0 10px; }
        .brand-icon {
            width: 45px; height: 45px; background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white; box-shadow: 0 8px 20px rgba(79,70,229,0.4);
        }
        .sidebar-brand h3 { font-size: 1.4rem; font-weight: 800; margin: 0; }
        .nav-menu { padding: 0; margin: 0; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 14px 20px;
            color: #94a3b8; text-decoration: none; border-radius: 12px;
            font-weight: 500; font-size: 0.95rem; transition: 0.3s;
        }
        .nav-item i { font-size: 1.1rem; width: 22px; text-align: center; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.08); }
        .nav-item.active { background: linear-gradient(90deg, var(--primary), var(--primary-light)); color: white; font-weight: 600; box-shadow: 0 4px 15px rgba(79,70,229,0.3); }
        .logout-btn {
            display: flex; align-items: center; gap: 15px; padding: 14px 20px;
            color: #ef4444; text-decoration: none; border-radius: 12px;
            font-weight: 600; transition: 0.3s; margin-top: auto;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.1); }

        /* MAIN CONTENT */
        .main-content { margin-left: 280px; flex: 1; padding: 40px; }

        /* TOP HEADER */
        .content-header {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 18px 30px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 35px;
            border: 1px solid #f1f5f9;
        }
        .content-header h4 { margin: 0; font-size: 1.4rem; font-weight: 800; color: #0f172a; }
        .content-header h4 i { color: var(--primary); }
        .content-header p { margin: 3px 0 0; color: #64748b; font-size: 0.9rem; }

        /* FORM CARD */
        .form-card {
            background: white; border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9; overflow: hidden;
        }
        .form-card .card-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white; padding: 25px 30px;
        }
        .form-card .card-header h2 { font-size: 1.3rem; font-weight: 700; margin: 0; }
        .form-card .card-body { padding: 35px; }
        .form-label { font-weight: 600; color: #475569; font-size: 0.9rem; }
        .form-label.required::after { content: ' *'; color: #ef4444; }
        .form-control, .form-select {
            border-radius: 12px; padding: 12px 16px;
            border: 1.5px solid #e2e8f0; font-family: 'Outfit';
            font-size: 0.95rem; transition: 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary); outline: none;
            box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
        }
        .btn-save {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none; border-radius: 14px; font-weight: 700;
            font-size: 1rem; padding: 14px; font-family: 'Outfit';
            box-shadow: 0 8px 20px rgba(79,70,229,0.3); transition: 0.3s;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(79,70,229,0.4); }
        .form-text { color: #94a3b8; font-size: 0.83rem; }

        /* Image Upload Styles */
        .avatar-placeholder {
            width: 120px; height: 120px; background: #e2e8f0; color: #94a3b8;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; margin: 0 auto 15px; border: 4px solid white; outline: 3px solid #f1f5f9;
        }
        .preview-img {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            margin: 0 auto 15px; display: none; border: 4px solid white; outline: 3px solid var(--primary-light);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
            <h3>MedSmart HQ</h3>
        </div>
        <nav class="nav-menu">
            <a href="../admin_dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>Asosiy dashboard</span></a>
            <a href="../bemorlar/bemorlar_royxati.html" class="nav-item active"><i class="fas fa-users"></i><span>Bemorlar boshqaruvi</span></a>
            <a href="../shifokorlar/shifokorlar_royxati.html" class="nav-item"><i class="fas fa-user-md"></i><span>Shifokorlar</span></a>
            <a href="../navbatlar/navbatlar.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Navbatlar</span></a>
            <a href="../xizmatlar/xizmatlar_royxati.html" class="nav-item"><i class="fas fa-hand-holding-medical"></i><span>Xizmatlar</span></a>
            <a href="../tolovlar/tolovlar.html" class="nav-item"><i class="fas fa-file-invoice-dollar"></i><span>Moliya & To'lovlar</span></a>
            <a href="../tizim_sozlamalari/tizim_sozlamalari.html" class="nav-item"><i class="fas fa-sliders-h"></i><span>Sozlamalar</span></a>
        </nav>
        <a href="javascript:chiqish()" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i><span>Tizimdan chiqish</span>
        </a>
    </aside>

    <main class="main-content">
        <div class="content-header">
            <div>
                <h4><i class="fas fa-user-plus me-2"></i>Yangi bemor qo'shish</h4>
                <p>Bemor ma'lumotlarini to'ldiring</p>
            </div>
            <div style="text-align:right;">
                <strong id="userName" style="display:block; font-weight:700;">Foydalanuvchi</strong>
                <small style="color:#64748b;" id="userRole">Admin panel</small>
            </div>
        </div>

            <!-- FORM CONTENT -->
            <div class="form-card">
                <div class="card-header">
                    <h2 class="mb-0"><i class="fas fa-user-plus me-3"></i>Yangi bemor qo'shish</h2>
                </div>
                <div class="card-body">
                    <!-- Rasm yuklash + preview -->
                    <div class="text-center mb-5">
                        <div id="imageContainer">
                            <div class="avatar-placeholder" id="avatarPlaceholder">
                                <i class="fas fa-user"></i>
                            </div>
                            <img id="preview" class="preview-img" alt="Bemor rasmi">
                        </div>
                        <div class="mt-4">
                            <label class="btn btn-outline-primary btn-lg">
                                <i class="fas fa-camera me-2"></i> Rasm tanlash
                                <input type="file" id="rasm_input" accept="image/*" style="display:none" onchange="rasmYuklash(event)">
                            </label>
                            <p class="text-muted small mt-2">(.jpg, .png, maksimal 2MB)</p>
                        </div>
                    </div>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label required">F.I.Sh</label>
                            <input type="text" id="fio" class="form-control form-control-lg" placeholder="Saidov Javlonbek Alijon o'g'li" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telefon raqami</label>
                            <input type="text" id="telefon" class="form-control form-control-lg" placeholder="998 (__) ___ __ __">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tug'ilgan sana</label>
                            <input type="date" id="tugilgan" class="form-control form-control-lg">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Jinsi</label>
                            <select id="jins" class="form-select form-select-lg">
                                <option value="Erkak">Erkak</option>
                                <option value="Ayol">Ayol</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Pasport</label>
                            <input type="text" id="pasport" class="form-control form-control-lg" placeholder="AA1234567">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Manzil</label>
                            <textarea id="manzil" class="form-control" rows="2" placeholder="Samarqand shahar, Kattaqo'rg'on shahar..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Eslatma (allergiya, surunkali kasallik)</label>
                            <textarea id="eslatma" class="form-control" rows="3" placeholder="Masalan: Penitsillinga allergiya, qandli diabet..."></textarea>
                        </div>
                    </div>

                    <div class="d-grid mt-5">
                        <button onclick="bemorSaqlash()" class="btn btn-save text-white btn-lg">
                            <i class="fas fa-save me-2"></i> Bemorni saqlash
                        </button>
                    </div>

                    <div id="natija" class="mt-4 text-center fw-bold fs-5"></div>
                    
                    <div class="text-center mt-4">
                        <a href="../bemorlar/bemorlar_royxati.html" class="btn btn-outline-secondary btn-lg">
                            <i class="fas fa-arrow-left me-2"></i> Bemorlar ro'yxatiga qaytish
                        </a>
                    </div>
                </div>
            </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/config.js"></script>
<script src="../../js/apiClient.js"></script>
<script>
// =======================
// CREATE → NODE.JS API
// =======================
async function bemorSaqlash() {
  const fioVal = fio.value.trim();
  if (!fioVal) {
    natija.innerHTML = "<span class='text-danger'>❌ F.I.Sh majburiy!</span>";
    fio.focus();
    return;
  }

  const payload = {
    name: fioVal,
    phone: telefon.value.trim(),
    dateOfBirth: tugilgan.value || null,
    gender: jins.value,
    passport: pasport.value.trim(),
    address: manzil.value.trim(),
    allergies: eslatma.value.trim()
  };

  const res = await window.apiClient.post('/patients', payload);

  if (!res) return; // apiClient will show toast on error

  natija.innerHTML =
    "<span class='text-success'>✅ Bemor muvaffaqiyatli qo‘shildi!</span>";

  setTimeout(() => {
    location.href = "bemorlar_royxati.html";
  }, 1200);
}
</script>

</body>
</html>
