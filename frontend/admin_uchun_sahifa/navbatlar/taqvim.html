                        <div class="user-avatar">

            <!-- STATISTIKA -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="bugunNavbat">0</div>

                </div>
                <div class="stat-card">
                    <div class="stat-number" id="haftaNavbat">0</div>

                    <div class="stat-label">Bu Oy</div>

    <script>
document.addEventListener('DOMContentLoaded', function() {
    checkAuthentication();
    loadUserInfo();
    loadStatistics();
    initializeCalendar();
});

// Autentifikatsiya tekshirish
function checkAuthentication() {
    const user = localStorage.getItem('foydalanuvchi');

}

// Foydalanuvchi ma'lumotlarini yuklash
function loadUserInfo() {
    const user = localStorage.getItem('foydalanuvchi');
    const userName = localStorage.getItem('foydalanuvchiNomi') || user;
    setText('userName', userName);
}

// Chiqish
function chiqish() {
    if (confirm('Tizimdan chiqishni xohlaysizmi?')) {
        localStorage.clear();
        window.location.href = '../../index.html';
    }
}

// Statistika yuklash
function loadStatistics() {
    const navbatlar = JSON.parse(localStorage.getItem('navbatlar')) || [];
    const bugun = new Date().toISOString().split('T')[0];        
    const today = new Date();
    const startOfWeek = new Date(today);
    startOfWeek.setDate(today.getDate() - today.getDay());
    const endOfWeek = new Date(today);
    endOfWeek.setDate(today.getDate() + (6 - today.getDay()));
    const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    const endOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);

    const bugunNavbat = navbatlar.filter(n => n.sana === bugun).length;
    const haftaNavbat = navbatlar.filter(n => {
        const navbatSana = new Date(n.sana);
        return navbatSana >= startOfWeek && navbatSana <= endOfWeek;
    }).length;
    const oyNavbat = navbatlar.filter(n => {
        const navbatSana = new Date(n.sana);
        return navbatSana >= startOfMonth && navbatSana <= endOfMonth;
    }).length;

    setText('bugunNavbat', bugunNavbat);
    setText('haftaNavbat', haftaNavbat);
    setText('oyNavbat', oyNavbat);
    setText('jamiNavbat', navbatlar.length);
}

// Calendar ishga tushirish
function initializeCalendar() {
    const calendarEl = document.getElementById('calendar');
    if (!calendarEl) return;

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'uz',
        firstDay: 1,
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        buttonText: {
            today: 'Bugun',
            month: 'Oy',
            week: 'Hafta',
            day: 'Kun'
        },
        events: function(fetchInfo, successCallback) {
            let navbatlar = JSON.parse(localStorage.getItem('navbatlar')) || [];
            let events = navbatlar.map(n => {
                const bugun = new Date().toISOString().split('T')[0];
                let backgroundColor = '#28a745'; 
                if (n.sana < bugun) {
                    backgroundColor = '#6c757d'; 
                } else if (n.sana === bugun) {
                    backgroundColor = '#fd79a8'; 
                }
                return {
                    id: n.id,
                    title: `${n.bemor_fio} - ${n.shifokor}`,
                    start: n.sana + 'T' + n.vaqt,
                    backgroundColor: backgroundColor,
                    borderColor: backgroundColor,
                    textColor: 'white',
                    extendedProps: {
                        izoh: n.izoh,
                        telefon: n.telefon
                    }
                };
            });
            successCallback(events);
        },
        eventClick: function(info) {
            showNavbatDetails(info.event);
        },
        dateClick: function(info) {
            const sana = info.dateStr;
            window.location.href = `navbat_yozish.html?sana=${sana}`;
        },
        eventDisplay: 'block',
        eventTimeFormat: {
            hour: '2-digit',
            minute: '2-digit',
            meridiem: false
        }
    });
    
    calendar.render();
    window.calendar = calendar;
}

function showNavbatDetails(event) {
    const navbat = event.extendedProps;
    const startTime = event.start.toLocaleTimeString('uz-UZ', { 
        hour: '2-digit', 
        minute: '2-digit' 
    });
    const startDate = event.start.toLocaleDateString('uz-UZ', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });
    const modalHtml = `
        <div class="modal fade" id="navbatModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fas fa-calendar-check me-2"></i>Navbat Tafsilotlari
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3"><strong>Bemor:</strong> ${event.title.split(' - ')[0]}</div>
                        <div class="mb-3"><strong>Shifokor:</strong> ${event.title.split(' - ')[1]}</div>
                        <div class="mb-3"><strong>Sana:</strong> ${startDate}</div>
                        <div class="mb-3"><strong>Vaqt:</strong> ${startTime}</div>
                        ${navbat.izoh ? `<div class="mb-3"><strong>Izoh:</strong> ${navbat.izoh}</div>` : ''}
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fas fa-times me-2"></i>Yopish
                        </button>
                        <button type="button" class="btn btn-danger" onclick="deleteNavbat(${event.id})">
                            <i class="fas fa-trash me-2"></i>O'chirish
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `;
    if (!document.getElementById('navbatModal')) {
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    const modal = new bootstrap.Modal(document.getElementById('navbatModal'));
    modal.show();
}

// Navbatni o'chirish
function deleteNavbat(navbatId) {
    if (confirm('Bu navbatni o\'chirishni xohlaysizmi?')) {
        let navbatlar = JSON.parse(localStorage.getItem('navbatlar')) || [];
        navbatlar = navbatlar.filter(n => n.id !== navbatId);
        localStorage.setItem('navbatlar', JSON.stringify(navbatlar));
        
        if (window.calendar) {
            window.calendar.refetchEvents();
        }
        loadStatistics();
        const modal = bootstrap.Modal.getInstance(document.getElementById('navbatModal'));
        if (modal) modal.hide();
        alert('Navbat muvaffaqiyatli o\'chirildi!');
    }
}

// Matn qo‘yish uchun yordamchi
function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
}

// Bootstrap modal CSS va JS qo'shish

bootstrapCSS.rel = 'stylesheet';

bootstrapJS.src = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js';
document.body.appendChild(bootstrapJS);
</script>
