<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --bg: #f8fafc;
      --text: #1e293b;
      --muted: #64748b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ecfdf5 0%, #f8fafc 100%);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 50px -10px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(16,185,129,0.1);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-wrap {
      width: 70px;
      height: 70px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      box-shadow: 0 10px 20px -5px rgba(16,185,129,0.4);
    }

    .logo-wrap i {
      color: white;
      font-size: 2rem;
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary-dark);
      margin: 0;
    }

    .brand-tagline {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .form-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 25px 0 10px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1.1rem;
      transition: 0.3s;
    }

    .input-field {
      width: 100%;
      padding: 14px 48px 14px 48px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s;
      outline: none;
      background: #f8fafc;
    }

    .input-field:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(16,185,129,0.1);
    }

    .input-field:focus + i {
      color: var(--primary);
    }

    .password-toggle {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      transition: 0.2s;
    }

    .password-toggle:hover {
      color: var(--primary);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      box-shadow: 0 10px 20px -5px rgba(16,185,129,0.3);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -5px rgba(16,185,129,0.4);
      filter: brightness(1.1);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .extra-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 0.85rem;
    }

    .extra-actions a {
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .extra-actions a:hover {
      text-decoration: underline;
    }

    /* Error Message Overlay */
    .login-error {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: #ef4444;
      padding: 12px 24px;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      z-index: 1000;
      border: 1px solid #fee2e2;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      animation: errorBounce 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }

    @keyframes errorBounce {
      from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card">
      <div class="logo-container">
        <div class="logo-wrap">
          <i class="fas fa-heartbeat"></i>
        </div>
        <h1 class="brand-name">Med Smart</h1>
        <p class="brand-tagline">Sizning ishonchli tibbiy yordamchingiz</p>
      </div>

      <div class="form-title">Tizimga kirish</div>

      <form class="form">
        <div class="form-group">
          <label class="form-label">Email manzili</label>
          <div class="input-wrapper">
            <input type="email" class="input-field" id="email-input" placeholder="example@mail.com" spellcheck="false" required>
            <i class="fas fa-envelope"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Parol</label>
          <div class="input-wrapper">
            <input type="password" class="input-field" id="password-input" placeholder="••••••••" spellcheck="false" required>
            <i class="fas fa-lock"></i>
            <span class="password-toggle" onclick="togglePassword()">
              <i class="fas fa-eye" id="toggleIcon"></i>
            </span>
          </div>
        </div>

        <button class="submit-btn submit" type="button">Kirish</button>
      </form>

      <div class="extra-actions">
        <a href="#">Parolni unutdingizmi?</a>
        <a href="#">Ro'yxatdan o'tish</a>
      </div>
    </div>
  </div>

  <!-- Mevjud skriptlarni yangilash -->
  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password-input');
      const toggleIcon = document.getElementById('toggleIcon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      }
    }
  </script>


<script src="../js/xavfsizlik.js"></script>
<script src="../js/sinxronizatsiya.js"></script>
<script>
  // Submit tugmasini olish
  const submitBtn = document.querySelector(".submit");

  submitBtn.onclick = async () => {
    const email = document.getElementById("email-input").value.trim();
    const password = document.getElementById("password-input").value.trim();

    try {
      // Xavfsizlik tekshiruvi
      if (securityManager.isAccountLocked(email)) {
        throw new Error('Hisobingiz vaqtincha bloklangan. Iltimos, keyinroq urinib ko\'ring.');
      }

      // Parolni tekshirish
      const passwordValidation = securityManager.validatePassword(password);
      if (!passwordValidation.isValid) {
        throw new Error(passwordValidation.errors.join(', '));
      }

      // Xavfsiz login
      const loginResult = await secureLogin(email, password);
      
      if (loginResult.success) {
        const user = loginResult.user;

        // Bemor joriy sessiyasini saqlash
        const patientData = {
          id: user.id,
          email: user.email,
          role: user.role,
          fullName: user.name,
          loginTime: new Date().toISOString(),
          permissions: ['view_appointments', 'book_appointment']
        };

        localStorage.setItem('medsmart_user', JSON.stringify(patientData));
        localStorage.setItem('userId', user.id);
        localStorage.setItem('userName', user.name);
        
        // Muvaffaqiyatli o'tish (Rolga qarab yo'naltirish)
        if (user.role === 'admin') {
          window.location.href = "../admin_uchun_sahifa/admin_dashboard.html";
        } else {
          window.location.href = "./bemor_dashboard.html";
        }
      }
    } catch (error) {
      // Xatolik holatida urinishni kuzatish
      securityManager.trackFailedAttempt(email);
      
      // Xatolikni ko'rsatish
      const errorDiv = document.createElement('div');
      errorDiv.className = 'login-error';
      errorDiv.innerHTML = `
        <div class="error-content">
          <i class="fas fa-exclamation-circle"></i>
          <span>${error.message}</span>
        </div>
      `;
      errorDiv.style.cssText = `
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        padding: 12px 16px;
        border-radius: 50px;
        box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
        z-index: 9999;
        animation: errorSlideIn 0.3s ease;
        max-width: 240px;
        font-size: 11px;
        margin: 8px auto;
        word-wrap: break-word;
        border: 2px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        text-align: center;
      `;
      
      // Error content styles
      const style = document.createElement('style');
      style.textContent = `
        .error-content {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 6px;
          text-align: center;
        }
        .error-content i {
          font-size: 12px;
          flex-shrink: 0;
        }
        .error-content span {
          line-height: 1.2;
          font-weight: 500;
        }
        @keyframes errorSlideIn {
          from {
            opacity: 0;
            transform: translateX(-50%) translateY(-10px);
          }
          to {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
          }
        }
        @keyframes errorSlideOut {
          from {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
          }
          to {
            opacity: 0;
            transform: translateX(-50%) translateY(-10px);
          }
        }
      `;
      if (!document.querySelector('style[data-error-styles]')) {
        style.setAttribute('data-error-styles', 'true');
        document.head.appendChild(style);
      }
      
      // Avvalgi xatolikni olib tashlash
      const existingError = document.querySelector('.login-error');
      if (existingError) {
        existingError.remove();
      }
      
      document.body.appendChild(errorDiv);
      
      // 5 soniyadan keyin xatolikni olib tashlash
      setTimeout(() => {
        if (document.body.contains(errorDiv)) {
          errorDiv.style.animation = 'errorSlideOut 0.3s ease';
          setTimeout(() => {
            if (document.body.contains(errorDiv)) {
              errorDiv.remove();
            }
          }, 300);
        }
      }, 5000);
    }
  };

  // Animatsiyalar uchun CSS
  const style = document.createElement('style');
  style.textContent = `
    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes slideOutRight {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }
  `;
  document.head.appendChild(style);
</script>

<script src="../js/ai-widget.js"></script>
</body>
</html>
