name: MedSmart CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install dependencies
      working-directory: ./backend
      run: npm install
    - name: DB connection test
      working-directory: ./backend
      run: node -e "require('./config/db')"
    - name: Server boot test
      working-directory: ./backend
      env:
        PORT: 5000
        JWT_SECRET: ci_test_secret_key_123
        GEMINI_API_KEY: ci_test_gemini_key
      run: timeout 5s node -e "require('./server')" || code=$?; if [[ $code -ne 124 ]]; then exit $code; fi; echo "Server booted successfully"
    - name: Verify required files exist
      working-directory: ./backend
      run: |
        test -f controllers/aiController.js || (echo "Missing aiController.js" && exit 1)
        test -f controllers/userController.js || (echo "Missing userController.js" && exit 1)
        test -f middlewares/authMiddleware.js || (echo "Missing authMiddleware.js" && exit 1)
        test -f utils/logger.js || (echo "Missing logger.js" && exit 1)
    - name: Print summary
      run: echo "✅ Backend test steps fully passed!"

  test-ai-service:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      working-directory: ./ai_service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Verify external imports
      run: python -c "import fastapi, sklearn, mlxtend"
    - name: App load test
      run: python -c "from ai_service.api import app"
    - name: Verify ML Models exist
      working-directory: ./ai_service/models
      run: |
        test -f seasonal_model.pkl || (echo "Missing seasonal_model.pkl" && exit 1)
        test -f progression_rules.pkl || (echo "Missing progression_rules.pkl" && exit 1)
        test -f le_disease.pkl || (echo "Missing le_disease.pkl" && exit 1)
    - name: Print summary
      run: echo "✅ AI Service test steps fully passed!"

  deploy-check:
    needs: [test-backend, test-ai-service]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Verify .env.example exists
      run: test -f .env.example || (echo "Missing .env.example" && exit 1)
    - name: Verify README.md has Installation section
      run: grep -q -i "Installation" README.md || (echo "Missing Installation section in README.md" && exit 1)
    - name: Deployment Readiness Report
      run: echo "✅ Infrastructure is fully ready for Production Deployment."
