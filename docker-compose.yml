version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai_service:8000
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_for_local_compose}
      - PORT=5000
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - ai_service
    restart: unless-stopped

  ai_service:
    build: 
      context: ./ai_service
    ports:
      - "8000:8000"
    volumes:
      - ./ai_service/models:/app/models
    environment:
      - PORT=8000
      - ENV=production
    restart: unless-stopped
